name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -e ".[dev]"
    
    - name: Lint with ruff
      run: |
        ruff check src/ tests/ scripts/
    
    - name: Format check with black
      run: |
        black --check src/ tests/ scripts/
    
    - name: Type check with mypy
      run: |
        mypy src/
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  quick-explanation-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Run quick explanation test
      run: |
        python -c "
        import sys
        from pathlib import Path
        sys.path.append(str(Path.cwd() / 'src'))
        
        from models.cbm import ConceptBottleneckModel, load_iris_dataset, prepare_data, set_seed
        from models.trainer import CBMTrainer
        from explainers.concept_explainer import ConceptExplainer
        
        # Quick test
        set_seed(42)
        X, y, feature_names, concept_names, target_names = load_iris_dataset()
        X_train, X_val, X_test, y_train, y_val, y_test, scaler = prepare_data(X, y, test_size=0.2, val_size=0.1, random_state=42)
        
        model = ConceptBottleneckModel(input_dim=X_train.shape[1], concept_dim=4, task_dim=len(target_names))
        trainer = CBMTrainer(model=model, device='cpu', learning_rate=0.001)
        
        from torch.utils.data import DataLoader, TensorDataset
        train_dataset = TensorDataset(torch.FloatTensor(X_train), torch.LongTensor(y_train))
        train_loader = DataLoader(train_dataset, batch_size=16, shuffle=True)
        
        # Train for just a few epochs
        history = trainer.train(train_loader, train_loader, epochs=5, patience=10, verbose=False)
        
        # Test explanation
        explainer = ConceptExplainer(model, 'cpu')
        X_test_tensor = torch.FloatTensor(X_test[:5])
        interactions = explainer.analyze_concept_interactions(X_test_tensor, concept_names)
        
        print('Quick explanation test completed successfully!')
        print(f'Model trained for {len(history[\"train_loss\"])} epochs')
        print(f'Concept interactions computed for {len(interactions)} concepts')
        "
    
    - name: Test Streamlit demo (dry run)
      run: |
        python -c "
        import streamlit as st
        print('Streamlit import successful')
        "
